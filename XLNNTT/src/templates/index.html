<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>
Sentiment Compare
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
linear-gradient(
135deg,
#0f172a,
#1e293b
);

color:white;

font-family:

Segoe UI;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.card{

width:800px;

background:

rgba(
255,
255,
255,
0.05
);

padding:

40px;

border-radius:

24px;

}

h1{

margin-bottom:

30px;

}

textarea{

width:100%;

height:180px;

padding:20px;

background:

#111827;

color:white;

border:none;

border-radius:16px;

font-size:18px;

}

button{

width:100%;

margin-top:20px;

padding:16px;

font-size:18px;

border:none;

border-radius:16px;

cursor:pointer;

background:

linear-gradient(
90deg,
#2563eb,
#7c3aed
);

color:white;

}

.result{

margin-top:30px;

display:flex;

gap:20px;

}

.model{

flex:1;

background:

#111827;

padding:20px;

border-radius:16px;

}

.green{

color:#22c55e;

}

.red{

color:#ef4444;

}

</style>

</head>

<body>

<div class="card">

<h1>

🧠 Compare Sentiment Models

</h1>

<textarea
id="review"
placeholder="Type review here">
</textarea>

<button
onclick="compare()">

Compare Models

</button>

<div
class="result">

<div
class="model">

<h3>

Logistic Regression

</h3>

<div
id="logistic">

—

</div>

</div>


<div
class="model">

<h3>

LinearSVC

</h3>

<div
id="svm">

—

</div>

</div>

</div>

</div>


<script>

async function compare(){

let review=

document
.getElementById(
"review"
)
.value


let response=

await fetch(

"/api/compare",

{

method:
"POST",

headers:{

"Content-Type":
"application/json"

},

body:
JSON.stringify({

text:
review

})

}

)


let data=

await response.json()


document
.getElementById(
"logistic"
)

.innerHTML=

data
.logistic


document
.getElementById(
"svm"
)

.innerHTML=

data
.svm

}

</script>

</body>

</html>
